name: _Mesh Propagation

on:
  workflow_call:

permissions:
  contents: read
  actions: write

jobs:
  propagate:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MESH_REPOSITORY: NguyenCuong1989/trust_of_copilot
    steps:
      - name: Repository dispatch to mesh receiver
        run: |
          curl -sS -X POST "https://api.github.com/repos/${MESH_REPOSITORY}/dispatches" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d @- <<JSON
          {
            "event_type": "mcp_propagation",
            "client_payload": {
              "source_repo": "NguyenCuong1989/trust_of_copilot",
              "source_workflow": "orchestrator",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }
          }
          JSON
