name: PR Generator

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/create-pr-from-notion.mjs
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
